#cloud-config
package_update: true
package_upgrade: true

packages:
  - curl
  - unzip
  - wget
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - gnupg
  - qemu-guest-agent

runcmd:
  # Install Terraform
  - |
    curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list
    apt-get update && apt-get install -y terraform

  # Install Packer
  - |
    apt-get install -y packer

  # Install Ansible
  - |
    apt-add-repository --yes --update ppa:ansible/ansible
    apt-get update && apt-get install -y ansible

  # Install GitHub Runner
  - |
    RUNNER_VERSION="2.303.0" # Update to the latest version as needed
    RUNNER_ARCH="x64"        # Change architecture if needed (arm, arm64, etc.)
    mkdir -p /opt/actions-runner && cd /opt/actions-runner
    curl -o actions-runner-linux-${RUNNER_ARCH}-${RUNNER_VERSION}.tar.gz -L https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-${RUNNER_ARCH}-${RUNNER_VERSION}.tar.gz
    tar xzf ./actions-runner-linux-${RUNNER_ARCH}-${RUNNER_VERSION}.tar.gz
    ./bin/installdependencies.sh

# Final message
final_message: "Terraform, Packer, Ansible, and GitHub Runner have been installed successfully!"
